version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - VERTEX_SEARCH_ENGINE_ID=${VERTEX_SEARCH_ENGINE_ID:-}
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: http://localhost:8080
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    driver: bridge
